<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ClearClause — Understand Any Legal Document in Plain English</title>
    <meta name="description" content="Upload any contract, tenancy agreement, employment letter or terms of service. Get a plain English breakdown with key clauses and red flags in seconds. Free to start." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="ClearClause" />
    <meta name="keywords" content="legal document analysis, contract checker, tenancy agreement explained, employment contract UK, plain English legal, AI document review, NDA checker, terms of service explained" />

    <!-- Canonical -->
    <link rel="canonical" href="https://clearclause.co.uk" />

    <!-- Open Graph / Facebook / LinkedIn / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://clearclause.co.uk" />
    <meta property="og:title" content="ClearClause — Understand Any Legal Document Instantly" />
    <meta property="og:description" content="Stop signing documents you don't understand. AI-powered plain English analysis of contracts, tenancy agreements, NDAs, and more. Built for the UK. Free to start." />
    <meta property="og:image" content="https://clearclause.co.uk/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ClearClause — Documents written for lawyers. Now readable by everyone." />
    <meta property="og:site_name" content="ClearClause" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@clearclause" />
    <meta name="twitter:creator" content="@clearclause" />
    <meta name="twitter:title" content="ClearClause — Understand Any Legal Document Instantly" />
    <meta name="twitter:description" content="Stop signing documents you don't understand. AI-powered plain English analysis for the UK. Free to start." />
    <meta name="twitter:image" content="https://clearclause.co.uk/og-image.png" />
    <meta name="twitter:image:alt" content="ClearClause — Documents written for lawyers. Now readable by everyone." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/og-image.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#0d1b2a" />
    <meta name="color-scheme" content="dark" />

    <!-- Structured data — Organisation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ClearClause",
      "url": "https://clearclause.co.uk",
      "logo": "https://clearclause.co.uk/og-image.png",
      "description": "AI-powered legal document analysis in plain English. Built for the UK.",
      "email": "hello@clearclause.co.uk",
      "areaServed": "GB",
      "sameAs": [
        "https://twitter.com/clearclause"
      ]
    }
    </script>

    <!-- Structured data — SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ClearClause",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Upload any legal document and get a plain English breakdown with key clauses, red flags, and action steps.",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "GBP",
          "description": "3 document analyses per month"
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "9.99",
          "priceCurrency": "GBP",
          "billingIncrement": "P1M",
          "description": "Unlimited analyses, negotiation tips, PDF export"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "38"
      }
    }
    </script>

    <!-- Structured data — FAQPage (pricing FAQs) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is ClearClause actual legal advice?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. ClearClause is an AI analysis tool, not a law firm. It helps you understand what a document says in plain English. For high-stakes legal matters, consult a qualified solicitor."
          }
        },
        {
          "@type": "Question",
          "name": "Are my documents stored or shared?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Documents are sent securely for analysis and immediately discarded. We never store, train on, or share your document contents."
          }
        },
        {
          "@type": "Question",
          "name": "How much does ClearClause cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ClearClause is free to start with 3 analyses per month. Pro is £9.99/month (or £7.99/month billed annually) for unlimited analyses and premium features."
          }
        },
        {
          "@type": "Question",
          "name": "What types of documents can ClearClause analyse?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Employment contracts, tenancy agreements, terms of service, NDAs, freelance contracts, GDPR policies, mortgage offer letters, and any other text-based legal document."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
